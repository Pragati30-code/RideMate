spring.application.name=prod
spring.datasource.url=${DATABASE_URL}
spring.datasource.username=${DATABASE_USER}
spring.datasource.password=${DATABASE_PASS}
spring.datasource.driver-class-name=org.postgresql.Driver

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

jwt.secret=${JWT_SECRET}

admin.bootstrap.enabled=${ADMIN_BOOTSTRAP_ENABLED:false}
admin.bootstrap.email=${ADMIN_BOOTSTRAP_EMAIL}
admin.bootstrap.password=${ADMIN_BOOTSTRAP_PASSWORD}
admin.bootstrap.name=${ADMIN_BOOTSTRAP_NAME:RideMate Admin}

razorpay.key-id=${RAZORPAY_KEY_ID}
razorpay.key-secret=${RAZORPAY_KEY_SECRET}

spring.datasource.hikari.maximum-pool-size=2
spring.datasource.hikari.minimum-idle=0
spring.datasource.hikari.idle-timeout=10000
spring.datasource.hikari.max-lifetime=30000
spring.datasource.hikari.connection-timeout=20000

cors.allowed-origins=${FRONTEND_URL}